{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>设置新密码</h2>
            <div class="card">
                <div class="card-body">
                    <p class="text-muted">请输入您的新密码。</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button class="btn btn-success w-100" type="submit">重置密码</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
