{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>重置密码</h2>
            <div class="card">
                <div class="card-body">
                    <p class="text-muted">请输入您的邮箱地址，我们将向您发送密码重置链接。</p>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button class="btn btn-primary w-100" type="submit">发送重置邮件</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="{% url 'login' %}">返回登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
