{% extends 'base.html' %}
{% block content %}
<h2>个人中心</h2>
<div class="card">
    <div class="card-body">
        <h5 class="card-title">{{ user.profile.nickname }}</h5>
        <p class="card-text"><strong>用户名:</strong> {{ user.username }}</p>
        <p class="card-text"><strong>邮箱:</strong> {{ user.email }}</p>
        <p class="card-text"><strong>注册时间:</strong> {{ user.date_joined|date:"Y-m-d" }}</p>
        <a href="{% url 'post_list' %}" class="btn btn-primary">去发帖</a>
    </div>
</div>
{% endblock %}
