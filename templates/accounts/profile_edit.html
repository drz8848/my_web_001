{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2>编辑个人资料</h2>
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_nickname" class="form-label">昵称</label>
                            <input type="text" name="nickname" class="form-control" id="id_nickname" 
                                   value="{{ form.nickname.value|default:user.profile.nickname }}">
                        </div>
                        <div class="mb-3">
                            <label for="id_email" class="form-label">邮箱地址</label>
                            <input type="email" name="email" class="form-control" id="id_email" 
                                   value="{{ form.email.value|default:user.email }}" required>
                            <div class="form-text">修改邮箱后需要重新验证</div>
                        </div>
                        <div class="mb-3">
                            <label for="id_security_question" class="form-label">密保问题</label>
                            <input type="text" name="security_question" class="form-control" id="id_security_question" 
                                   value="{{ form.security_question.value|default:user.profile.security_question }}">
                        </div>
                        <div class="mb-3">
                            <label for="id_security_answer" class="form-label">密保答案</label>
                            <input type="text" name="security_answer" class="form-control" id="id_security_answer" 
                                   value="{{ form.security_answer.value|default:user.profile.security_answer }}">
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" type="submit">保存修改</button>
                            <a href="{% url 'profile' %}" class="btn btn-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
