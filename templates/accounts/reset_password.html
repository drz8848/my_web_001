{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>重置密码</h2>
        {% if not question %}
        <form method="get">
            <div class="mb-3">
                <label>输入用户名以获取密保问题</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <button class="btn btn-outline-primary" type="submit">下一步</button>
        </form>
        {% else %}
        <p class="alert alert-secondary">问题: {{ question }}</p>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="username" value="{{ request.GET.username }}">
            <div class="mb-3">
                <label>密保答案</label>
                <input type="text" name="answer" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>新密码</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <button class="btn btn-danger" type="submit">确认重置</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
