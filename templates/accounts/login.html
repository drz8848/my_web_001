{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>登录</h2>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-primary w-100" type="submit">登录</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{% url 'reset_password' %}">忘记密码？</a> | 
            <a href="{% url 'register' %}">没有账号？去注册</a>
        </div>
    </div>
</div>
{% endblock %}
